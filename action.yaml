name: "run-git-sumi"
description: "Use git-sumi to validate PR titles or lint commit ranges"
author: "Óscar <osc@osc.garden>"

branding:
  icon: 'search'
  color: 'purple'

inputs:
  mode:
    description: "Lint mode: 'pr-title' (default) or 'commits'"
    required: false
    default: "pr-title"
  from:
    description: "Start of revision range (exclusive). 'commits' mode only. Defaults to origin/<PR base branch>"
    required: false
    default: ""
  to:
    description: "End of revision range (inclusive). 'commits' mode only."
    required: false
    default: "HEAD"

runs:
  using: "composite"
  steps:
    - name: Check out repository (sparse, for sumi.toml only)
      if: inputs.mode != 'commits'
      uses: actions/checkout@v6
      with:
        sparse-checkout: .  # Check out only repository root, where 'sumi.toml' is located.

    - name: Check out repository (full history, for commit range)
      if: inputs.mode == 'commits'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download git-sumi binary
      shell: bash
      run: |
        curl -L "https://github.com/welpo/git-sumi/releases/download/v0.3.0/git-sumi-x86_64-unknown-linux-gnu.tar.xz" -o git-sumi.tar.xz

    - name: Extract and rename git-sumi binary
      shell: bash
      run: |
        tar -xf git-sumi.tar.xz
        mv git-sumi-x86_64-unknown-linux-gnu/git-sumi git-sumi
        chmod +x git-sumi

    - name: Lint PR title
      if: inputs.mode != 'commits'
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      shell: bash
      run: |
        export GIT_SUMI_QUIET=false
        output=$(./git-sumi -f table "${PR_TITLE}")
        exit_code=$?

        if [ $exit_code -eq 0 ]; then
          # Command succeeded. Format the output.
          content=$(echo "$output" | awk '/\| Key/,0' | head -n -1)
          last_line=$(echo "$output" | tail -n 1)
          {
            echo "## git-sumi"
            echo "$content"  # This is the Markdown table.
            echo ""
            echo "$last_line"  # Summary.
          } >> "${GITHUB_STEP_SUMMARY}"
        fi

    - name: Lint commit range
      if: inputs.mode == 'commits'
      shell: bash
      run: |
        FROM="${{ inputs.from }}"
        TO="${{ inputs.to }}"

        # Default 'from' to the PR base branch if not provided.
        if [ -z "$FROM" ]; then
          FROM="origin/${{ github.event.pull_request.base.ref }}"
        fi

        # Fail early if FROM is still empty (e.g. non-PR context without explicit 'from').
        if [ "$FROM" = "origin/" ]; then
          echo "::error::No 'from' input provided and no PR base branch detected. Set the 'from' input explicitly."
          exit 1
        fi

        export GIT_SUMI_QUIET=false

        {
          echo "## git-sumi — commit lint"
          echo ""
          echo "Linting commits in range \`${FROM}..${TO}\`"
          echo ""
        } >> "${GITHUB_STEP_SUMMARY}"

        # Capture merged stdout+stderr and the exit code.
        output=$(./git-sumi --from "${FROM}" --to "${TO}" 2>&1) && exit_code=0 || exit_code=$?

        # Handle empty range.
        if echo "$output" | grep -q "No commits found in range"; then
          echo "> No commits found in range \`${FROM}..${TO}\`." >> "${GITHUB_STEP_SUMMARY}"
          exit 0
        fi

        # Build a results table from the output.
        {
          echo "| Status | Commit | Details |"
          echo "|--------|--------|---------|"
        } >> "${GITHUB_STEP_SUMMARY}"

        while IFS= read -r line; do
          if [[ "$line" =~ ^\[([a-f0-9]+)\].*✅(.*) ]]; then
            sha="${BASH_REMATCH[1]}"
            echo "| :white_check_mark: | \`${sha}\` | All checks passed |" >> "${GITHUB_STEP_SUMMARY}"
          elif [[ "$line" =~ ^\[([a-f0-9]+)\].*❗(.*) ]]; then
            sha="${BASH_REMATCH[1]}"
            detail="${BASH_REMATCH[2]}"
            # Escape pipe characters for markdown table.
            detail="${detail//|/\\|}"
            echo "| :x: | \`${sha}\` | ${detail} |" >> "${GITHUB_STEP_SUMMARY}"
          fi
        done <<< "$output"

        echo "" >> "${GITHUB_STEP_SUMMARY}"

        # Add final summary line.
        if [ "$exit_code" -eq 0 ]; then
          commit_count=$(git rev-list "${FROM}..${TO}" --count 2>/dev/null || echo "unknown")
          echo ":white_check_mark: **All ${commit_count} commits passed linting.**" >> "${GITHUB_STEP_SUMMARY}"
        else
          summary=$(echo "$output" | grep -o '[0-9]* out of [0-9]* commits failed linting' | tail -1)
          if [ -n "$summary" ]; then
            echo ":x: **${summary}.**" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo ":x: **Commit linting failed.**" >> "${GITHUB_STEP_SUMMARY}"
          fi
        fi

        exit "$exit_code"
